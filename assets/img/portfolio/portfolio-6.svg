<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#0f2030"/>
    </linearGradient>
  </defs>
  <rect width="800" height="540" fill="url(#bg6)"/>
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="135" x2="800" y2="135"/><line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="405" x2="800" y2="405"/><line x1="267" y1="0" x2="267" y2="540"/>
    <line x1="534" y1="0" x2="534" y2="540"/>
  </g>
  <!-- Header -->
  <rect x="24" y="18" width="752" height="50" rx="10" fill="rgba(255,255,255,0.06)"/>
  <text x="50" y="48" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">Patient Outcome Modeler — ML Predictions</text>
  <rect x="574" y="30" width="100" height="22" rx="4" fill="rgba(6,214,160,0.2)" stroke="#06d6a0" stroke-width="1"/>
  <text x="624" y="45" font-family="Arial,sans-serif" font-size="10" fill="#06d6a0" text-anchor="middle">Model v2.4 Active</text>
  <rect x="684" y="30" width="72" height="22" rx="4" fill="#4361ee"/>
  <text x="720" y="45" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">Validate</text>
  <!-- Left: Survival curves -->
  <rect x="24" y="88" width="370" height="290" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="44" y="114" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="rgba(255,255,255,0.85)">Kaplan-Meier Survival Curves</text>
  <text x="44" y="130" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Treatment vs. Control Arm — 36 months</text>
  <!-- Y axis -->
  <text x="40" y="160" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="end">100%</text>
  <text x="40" y="200" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="end">75%</text>
  <text x="40" y="240" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="end">50%</text>
  <text x="40" y="280" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="end">25%</text>
  <text x="40" y="320" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="end">0%</text>
  <!-- Grid lines -->
  <line x1="48" y1="157" x2="375" y2="157" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="48" y1="197" x2="375" y2="197" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="48" y1="237" x2="375" y2="237" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="48" y1="277" x2="375" y2="277" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="48" y1="317" x2="375" y2="317" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <!-- Treatment arm (blue - better survival) -->
  <polyline points="60,157 100,160 140,164 180,170 220,178 260,186 300,196 340,208 360,215"
            fill="none" stroke="#4361ee" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Confidence interval shading -->
  <path d="M 60,153 L 100,156 L 140,159 L 180,165 L 220,172 L 260,180 L 300,189 L 340,201 L 360,208 L 360,222 L 340,215 L 300,203 L 260,192 L 220,184 L 180,175 L 140,169 L 100,164 L 60,161 Z"
        fill="rgba(67,97,238,0.1)"/>
  <!-- Control arm (teal - lower survival) -->
  <polyline points="60,157 100,163 140,172 180,184 220,200 260,218 300,238 340,258 360,268"
            fill="none" stroke="#06d6a0" stroke-width="2" stroke-dasharray="6 3" stroke-linejoin="round"/>
  <!-- X labels -->
  <text x="60" y="334" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">0</text>
  <text x="140" y="334" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">6m</text>
  <text x="220" y="334" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">12m</text>
  <text x="300" y="334" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">24m</text>
  <text x="360" y="334" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">36m</text>
  <!-- Legend -->
  <line x1="44" y1="352" x2="60" y2="352" stroke="#4361ee" stroke-width="2"/>
  <text x="66" y="356" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.55)">Treatment (n=312)</text>
  <line x1="180" y1="352" x2="196" y2="352" stroke="#06d6a0" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="202" y="356" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.55)">Control (n=308)</text>
  <text x="44" y="372" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Log-rank p = 0.0012 — Significant</text>
  <!-- Right: Feature importance -->
  <rect x="408" y="88" width="368" height="192" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="428" y="114" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="rgba(255,255,255,0.85)">Feature Importance (SHAP)</text>
  <!-- Bars -->
  <text x="560" y="136" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="end">Age at Diagnosis</text>
  <rect x="566" y="126" width="180" height="14" rx="3" fill="rgba(67,97,238,0.5)"/>
  <text x="754" y="137" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">0.42</text>
  <text x="560" y="158" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="end">Biomarker Level</text>
  <rect x="566" y="148" width="148" height="14" rx="3" fill="rgba(67,97,238,0.5)"/>
  <text x="754" y="159" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">0.35</text>
  <text x="560" y="180" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="end">Treatment Duration</text>
  <rect x="566" y="170" width="120" height="14" rx="3" fill="rgba(6,214,160,0.4)"/>
  <text x="754" y="181" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">0.28</text>
  <text x="560" y="202" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="end">ECOG Score</text>
  <rect x="566" y="192" width="84" height="14" rx="3" fill="rgba(6,214,160,0.35)"/>
  <text x="754" y="203" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">0.20</text>
  <text x="560" y="224" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="end">Prior Treatment</text>
  <rect x="566" y="214" width="56" height="14" rx="3" fill="rgba(245,158,11,0.4)"/>
  <text x="754" y="225" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">0.13</text>
  <text x="560" y="246" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="end">Comorbidity Index</text>
  <rect x="566" y="236" width="40" height="14" rx="3" fill="rgba(239,68,68,0.35)"/>
  <text x="754" y="247" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">0.09</text>
  <text x="560" y="268" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="end">Genetic Marker</text>
  <rect x="566" y="258" width="30" height="14" rx="3" fill="rgba(239,68,68,0.25)"/>
  <text x="754" y="269" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">0.07</text>
  <!-- Patient cohort table -->
  <rect x="408" y="292" width="368" height="90" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="428" y="316" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="rgba(255,255,255,0.85)">Patient Cohort Summary</text>
  <!-- Table header -->
  <rect x="422" y="322" width="340" height="18" rx="3" fill="rgba(67,97,238,0.15)"/>
  <text x="440" y="334" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">Cohort</text>
  <text x="530" y="334" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">N</text>
  <text x="580" y="334" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">Median OS</text>
  <text x="660" y="334" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">Resp. Rate</text>
  <text x="730" y="334" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">Status</text>
  <text x="440" y="352" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.65)">Treatment</text>
  <text x="530" y="352" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.65)">312</text>
  <text x="580" y="352" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.65)">24.8m</text>
  <text x="660" y="352" font-family="Arial,sans-serif" font-size="8" fill="#06d6a0">67%</text>
  <text x="730" y="352" font-family="Arial,sans-serif" font-size="8" fill="#06d6a0">✓ Active</text>
  <text x="440" y="368" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.65)">Control</text>
  <text x="530" y="368" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.65)">308</text>
  <text x="580" y="368" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.65)">16.3m</text>
  <text x="660" y="368" font-family="Arial,sans-serif" font-size="8" fill="#f59e0b">44%</text>
  <text x="730" y="368" font-family="Arial,sans-serif" font-size="8" fill="#f59e0b">⚑ Monitor</text>
  <!-- Model metrics bottom -->
  <rect x="24" y="396" width="752" height="116" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="44" y="422" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="rgba(255,255,255,0.85)">Model Performance Metrics</text>
  <rect x="44" y="432" width="130" height="68" rx="6" fill="rgba(67,97,238,0.1)"/>
  <text x="109" y="456" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#4361ee" text-anchor="middle">0.89</text>
  <text x="109" y="472" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">AUC-ROC</text>
  <text x="109" y="490" font-family="Arial,sans-serif" font-size="8" fill="#06d6a0" text-anchor="middle">Excellent</text>
  <rect x="192" y="432" width="130" height="68" rx="6" fill="rgba(6,214,160,0.08)"/>
  <text x="257" y="456" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#06d6a0" text-anchor="middle">84%</text>
  <text x="257" y="472" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Sensitivity</text>
  <rect x="340" y="432" width="130" height="68" rx="6" fill="rgba(255,255,255,0.04)"/>
  <text x="405" y="456" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">91%</text>
  <text x="405" y="472" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Specificity</text>
  <rect x="488" y="432" width="130" height="68" rx="6" fill="rgba(255,255,255,0.04)"/>
  <text x="553" y="456" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">87%</text>
  <text x="553" y="472" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Precision</text>
  <rect x="636" y="432" width="120" height="68" rx="6" fill="rgba(67,97,238,0.1)" stroke="#4361ee" stroke-width="1"/>
  <text x="696" y="456" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#4361ee" text-anchor="middle">ICH E9</text>
  <text x="696" y="472" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Validated</text>
  <text x="696" y="490" font-family="Arial,sans-serif" font-size="8" fill="#06d6a0" text-anchor="middle">✓ Compliant</text>
</svg>
